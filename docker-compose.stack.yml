# Stack Afya — 9 microservices cible + BFF + gateway + UI (Phase 0 migration).
# Usage : ./scripts/stack-up.sh   ou   podman compose -f docker-compose.stack.yml up -d --build
# Prérequis : certificats TLS — ./scripts/generate-tls-certs.sh

x-spring-env: &spring-env
  SPRING_PROFILES_ACTIVE: docker
  JWT_ACCESS_SECRET: dev-access-secret-at-least-64-characters-long-for-hs512-signing-key
  JWT_REFRESH_SECRET: dev-refresh-secret-at-least-64-characters-long-for-hs512-signing-key
  AUDIT_INGESTION_KEY: dev-audit-ingestion-key
  INTERNAL_SERVICE_KEY: dev-internal-service-key

x-spring-health: &spring-health
  interval: 15s
  timeout: 5s
  retries: 12
  start_period: 120s

services:
  auth-db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: afya_auth
      POSTGRES_USER: afya
      POSTGRES_PASSWORD: afya
    volumes:
      - stack_auth_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afya -d afya_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  user-db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: afya_user
      POSTGRES_USER: afya
      POSTGRES_PASSWORD: afya
    volumes:
      - stack_user_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afya -d afya_user"]
      interval: 5s
      timeout: 5s
      retries: 10

  hospital-db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: afya_hospital
      POSTGRES_USER: afya
      POSTGRES_PASSWORD: afya
    volumes:
      - stack_hospital_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afya -d afya_hospital"]
      interval: 5s
      timeout: 5s
      retries: 10

  patient-db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: afya_patient
      POSTGRES_USER: afya
      POSTGRES_PASSWORD: afya
    volumes:
      - stack_patient_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afya -d afya_patient"]
      interval: 5s
      timeout: 5s
      retries: 10

  admission-db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: afya_admission
      POSTGRES_USER: afya
      POSTGRES_PASSWORD: afya
    volumes:
      - stack_admission_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afya -d afya_admission"]
      interval: 5s
      timeout: 5s
      retries: 10

  medical-db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: afya_medical
      POSTGRES_USER: afya
      POSTGRES_PASSWORD: afya
    volumes:
      - stack_medical_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afya -d afya_medical"]
      interval: 5s
      timeout: 5s
      retries: 10

  nursing-db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: afya_nursing
      POSTGRES_USER: afya
      POSTGRES_PASSWORD: afya
    volumes:
      - stack_nursing_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afya -d afya_nursing"]
      interval: 5s
      timeout: 5s
      retries: 10

  lab-db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: afya_lab
      POSTGRES_USER: afya
      POSTGRES_PASSWORD: afya
    volumes:
      - stack_lab_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afya -d afya_lab"]
      interval: 5s
      timeout: 5s
      retries: 10

  report-db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: afya_report
      POSTGRES_USER: afya
      POSTGRES_PASSWORD: afya
    volumes:
      - stack_report_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afya -d afya_report"]
      interval: 5s
      timeout: 5s
      retries: 10

  audit-db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: afya_audit
      POSTGRES_USER: afya
      POSTGRES_PASSWORD: afya
    volumes:
      - stack_audit_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afya -d afya_audit"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: docker.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - stack_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  auth:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.spring
      args:
        MAVEN_MODULE: auth-service
    environment:
      <<: *spring-env
    depends_on:
      auth-db:
        condition: service_healthy
      user:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      <<: *spring-health

  user:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.spring
      args:
        MAVEN_MODULE: user-service
    environment:
      <<: *spring-env
    depends_on:
      user-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/actuator/health"]
      <<: *spring-health

  hospital:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.spring
      args:
        MAVEN_MODULE: hospital-service
    environment:
      <<: *spring-env
    depends_on:
      hospital-db:
        condition: service_healthy
      audit:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      <<: *spring-health

  patient:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.spring
      args:
        MAVEN_MODULE: patient-service
    environment:
      <<: *spring-env
    depends_on:
      patient-db:
        condition: service_healthy
      audit:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      <<: *spring-health

  audit:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.spring
      args:
        MAVEN_MODULE: audit-service
    environment:
      <<: *spring-env
    depends_on:
      audit-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/actuator/health"]
      <<: *spring-health

  admission:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.spring
      args:
        MAVEN_MODULE: admission-service
    environment:
      <<: *spring-env
    depends_on:
      admission-db:
        condition: service_healthy
      patient:
        condition: service_healthy
      hospital:
        condition: service_healthy
      audit:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      <<: *spring-health

  medical:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.spring
      args:
        MAVEN_MODULE: medical-service
    environment:
      <<: *spring-env
      STORAGE_PROVIDER: minio
      MINIO_ENDPOINT: http://minio:9000
      ADMISSION_SERVICE_URL: http://admission:8084
    depends_on:
      medical-db:
        condition: service_healthy
      patient:
        condition: service_healthy
      minio:
        condition: service_healthy
      audit:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health"]
      <<: *spring-health

  nursing:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.spring
      args:
        MAVEN_MODULE: nursing-service
    environment:
      <<: *spring-env
      ADMISSION_SERVICE_BASE_URL: http://admission:8084
    depends_on:
      nursing-db:
        condition: service_healthy
      medical:
        condition: service_healthy
      admission:
        condition: service_healthy
      audit:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8093/actuator/health"]
      <<: *spring-health

  lab:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.spring
      args:
        MAVEN_MODULE: lab-service
    environment:
      <<: *spring-env
    depends_on:
      lab-db:
        condition: service_healthy
      report:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/actuator/health"]
      <<: *spring-health

  report:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.spring
      args:
        MAVEN_MODULE: report-service
    environment:
      <<: *spring-env
    depends_on:
      report-db:
        condition: service_healthy
      audit:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8094/actuator/health"]
      <<: *spring-health

  bff:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.spring
      args:
        MAVEN_MODULE: afya-bff
    environment:
      <<: *spring-env
      CORS_ALLOWED_ORIGINS: http://localhost:8088,http://127.0.0.1:8088,https://localhost:8443,https://127.0.0.1:8443
    depends_on:
      auth:
        condition: service_healthy
      user:
        condition: service_healthy
      hospital:
        condition: service_healthy
      patient:
        condition: service_healthy
      admission:
        condition: service_healthy
      medical:
        condition: service_healthy
      nursing:
        condition: service_healthy
      lab:
        condition: service_healthy
      report:
        condition: service_healthy
      audit:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      <<: *spring-health

  api:
    build:
      context: ./infra/gateway
    ports:
      - "8090:80"
      - "8443:443"
    volumes:
      - ./infra/gateway/certs:/etc/nginx/certs:ro,Z
    environment:
      BFF_UPSTREAM: http://bff:8080
    depends_on:
      bff:
        condition: service_healthy

  web:
    build:
      context: ./frontend
    ports:
      - "8088:80"
    depends_on:
      - api

volumes:
  stack_auth_pg:
  stack_user_pg:
  stack_hospital_pg:
  stack_patient_pg:
  stack_admission_pg:
  stack_medical_pg:
  stack_nursing_pg:
  stack_lab_pg:
  stack_report_pg:
  stack_audit_pg:
  stack_minio_data:
