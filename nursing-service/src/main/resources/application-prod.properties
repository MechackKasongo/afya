spring.datasource.url=jdbc:postgresql://${NURSING_DB_HOST}:${NURSING_DB_PORT:5432}/${NURSING_DB_NAME:afya_nursing}?sslmode=${DB_SSLMODE:require}
spring.datasource.username=${NURSING_DB_USER}
spring.datasource.password=${NURSING_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

app.jwt.access-secret=${JWT_ACCESS_SECRET}

app.services.patient-base-url=${PATIENT_SERVICE_URL:http://patient:8083}
app.services.admission-base-url=${ADMISSION_SERVICE_URL:http://admission:8084}
app.services.audit-base-url=${AUDIT_SERVICE_BASE_URL:http://audit:8087}

app.storage.provider=${STORAGE_PROVIDER:minio}
app.storage.minio.endpoint=${MINIO_ENDPOINT}
app.storage.minio.access-key=${MINIO_ACCESS_KEY}
app.storage.minio.secret-key=${MINIO_SECRET_KEY}
app.storage.minio.bucket=${MINIO_BUCKET:afya-clinical}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Lot C — Swagger/OpenAPI désactivé en production (réduction de la surface d'attaque).
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
