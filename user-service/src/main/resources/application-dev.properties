spring.datasource.url=jdbc:postgresql://${USER_DB_HOST:localhost}:${USER_DB_PORT:5444}/${USER_DB_NAME:afya_user}
spring.datasource.username=${USER_DB_USER:afya}
spring.datasource.password=${USER_DB_PASSWORD:afya}
spring.datasource.driver-class-name=org.postgresql.Driver

app.jwt.access-secret=${JWT_ACCESS_SECRET:dev-access-secret-at-least-64-characters-long-for-hs512-signing-key}

app.credentials-log.path=${user.home}/.afya/credentials-log.txt
