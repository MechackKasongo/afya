spring.datasource.url=jdbc:postgresql://${PATIENT_DB_HOST}:${PATIENT_DB_PORT:5432}/${PATIENT_DB_NAME:afya_patient}?sslmode=${DB_SSLMODE:require}
spring.datasource.username=${PATIENT_DB_USER}
spring.datasource.password=${PATIENT_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

app.jwt.access-secret=${JWT_ACCESS_SECRET}

app.services.audit-base-url=${AUDIT_SERVICE_BASE_URL:http://audit:8087}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
