spring.datasource.url=jdbc:postgresql://${REPORT_DB_HOST}:${REPORT_DB_PORT:5432}/${REPORT_DB_NAME:afya_report}?sslmode=${DB_SSLMODE:require}
spring.datasource.username=${REPORT_DB_USER}
spring.datasource.password=${REPORT_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

app.jwt.access-secret=${JWT_ACCESS_SECRET}
app.services.audit-base-url=${AUDIT_SERVICE_BASE_URL:http://audit:8087}
app.audit.ingestion-key=${AUDIT_INGESTION_KEY}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
