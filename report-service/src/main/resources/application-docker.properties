spring.datasource.url=jdbc:postgresql://${REPORT_DB_HOST:report-db}:5432/${REPORT_DB_NAME:afya_report}
spring.datasource.username=${REPORT_DB_USER:afya}
spring.datasource.password=${REPORT_DB_PASSWORD:afya}
spring.datasource.driver-class-name=org.postgresql.Driver

app.services.audit-base-url=${AUDIT_SERVICE_BASE_URL:http://audit:8087}
app.services.lab-base-url=${LAB_SERVICE_URL:http://lab:8092}
app.services.nursing-base-url=${NURSING_SERVICE_URL:http://nursing:8093}
app.audit.ingestion-key=${AUDIT_INGESTION_KEY:dev-audit-ingestion-key}
app.internal.service-key=${INTERNAL_SERVICE_KEY:dev-internal-service-key}
