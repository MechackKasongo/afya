spring.application.name=medical-service
spring.profiles.active=dev
server.port=8085

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info,metrics

app.services.patient-base-url=${PATIENT_SERVICE_URL:http://localhost:8083}
app.services.admission-base-url=${ADMISSION_SERVICE_URL:http://localhost:8084}
app.services.nursing-base-url=${NURSING_SERVICE_BASE_URL:http://localhost:8093}
app.internal.service-key=${INTERNAL_SERVICE_KEY:dev-internal-service-key}

app.http.client.connect-timeout=${HTTP_CLIENT_CONNECT_TIMEOUT:2s}
app.http.client.read-timeout=${HTTP_CLIENT_READ_TIMEOUT:10s}
app.http.client.retry.max-attempts=${HTTP_CLIENT_RETRY_MAX_ATTEMPTS:2}
app.http.client.retry.delay=${HTTP_CLIENT_RETRY_DELAY:250ms}
app.http.client.circuit.failure-threshold=${HTTP_CLIENT_CIRCUIT_FAILURE_THRESHOLD:5}
app.http.client.circuit.open-duration=${HTTP_CLIENT_CIRCUIT_OPEN_DURATION:30s}

app.services.audit-base-url=${AUDIT_SERVICE_BASE_URL:http://localhost:8087}
app.audit.enabled=${AUDIT_ENABLED:true}
app.audit.ingestion-key=${AUDIT_INGESTION_KEY:dev-audit-ingestion-key}

app.storage.provider=${STORAGE_PROVIDER:filesystem}
app.storage.filesystem.base-dir=${STORAGE_FS_BASE_DIR:./data/medical-object-store}
app.storage.minio.endpoint=${MINIO_ENDPOINT:http://127.0.0.1:9000}
app.storage.minio.access-key=${MINIO_ACCESS_KEY:minio}
app.storage.minio.secret-key=${MINIO_SECRET_KEY:minio123}
app.storage.minio.bucket=${MINIO_BUCKET:afya-medical}
app.storage.minio.auto-create-bucket=true
app.storage.max-upload-bytes=${STORAGE_MAX_UPLOAD_BYTES:10485760}

spring.servlet.multipart.max-file-size=12MB
spring.servlet.multipart.max-request-size=12MB
logging.pattern.level=%5p [corr:%X{correlationId:-na}]
