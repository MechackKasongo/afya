spring.datasource.url=jdbc:postgresql://${IDENTITY_DB_HOST:localhost}:${IDENTITY_DB_PORT:5433}/${IDENTITY_DB_NAME:afya_identity}
spring.datasource.username=${IDENTITY_DB_USER:afya}
spring.datasource.password=${IDENTITY_DB_PASSWORD:afya}
spring.datasource.driver-class-name=org.postgresql.Driver

app.jwt.access-secret=${JWT_ACCESS_SECRET:dev-access-secret-at-least-64-characters-long-for-hs512-signing-key}
app.jwt.refresh-secret=${JWT_REFRESH_SECRET:dev-refresh-secret-at-least-64-characters-long-for-hs512-signing-key}

app.credentials-log.path=${user.home}/.afya/credentials-log.txt
