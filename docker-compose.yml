services:
  auth-db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: afya_auth
      POSTGRES_USER: afya
      POSTGRES_PASSWORD: afya
    ports:
      - "5443:5432"
    volumes:
      - auth_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afya -d afya_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  user-db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: afya_user
      POSTGRES_USER: afya
      POSTGRES_PASSWORD: afya
    ports:
      - "5444:5432"
    volumes:
      - user_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afya -d afya_user"]
      interval: 5s
      timeout: 5s
      retries: 10

  hospital-db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: afya_hospital
      POSTGRES_USER: afya
      POSTGRES_PASSWORD: afya
    ports:
      - "5447:5432"
    volumes:
      - hospital_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afya -d afya_hospital"]
      interval: 5s
      timeout: 5s
      retries: 10

  patient-db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: afya_patient
      POSTGRES_USER: afya
      POSTGRES_PASSWORD: afya
    ports:
      - "5435:5432"
    volumes:
      - patient_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afya -d afya_patient"]
      interval: 5s
      timeout: 5s
      retries: 10

  admission-db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: afya_admission
      POSTGRES_USER: afya
      POSTGRES_PASSWORD: afya
    ports:
      - "5441:5432"
    volumes:
      - admission_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afya -d afya_admission"]
      interval: 5s
      timeout: 5s
      retries: 10

  medical-db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: afya_medical
      POSTGRES_USER: afya
      POSTGRES_PASSWORD: afya
    ports:
      - "5445:5432"
    volumes:
      - medical_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afya -d afya_medical"]
      interval: 5s
      timeout: 5s
      retries: 10

  nursing-db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: afya_nursing
      POSTGRES_USER: afya
      POSTGRES_PASSWORD: afya
    ports:
      - "5446:5432"
    volumes:
      - nursing_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afya -d afya_nursing"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: docker.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # API Gateway (phase E) — HTTP + HTTPS (certificats auto-signés : ./scripts/generate-tls-certs.sh).
  api:
    build:
      context: ./infra/gateway
    ports:
      - "8090:80"
      - "8443:443"
    volumes:
      - ./infra/gateway/certs:/etc/nginx/certs:ro,Z
    environment:
      BFF_UPSTREAM: ${BFF_UPSTREAM:-http://host.docker.internal:8080}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  audit-db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: afya_audit
      POSTGRES_USER: afya
      POSTGRES_PASSWORD: afya
    ports:
      - "5439:5432"
    volumes:
      - audit_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afya -d afya_audit"]
      interval: 5s
      timeout: 5s
      retries: 10

  lab-db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: afya_lab
      POSTGRES_USER: afya
      POSTGRES_PASSWORD: afya
    ports:
      - "5440:5432"
    volumes:
      - lab_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afya -d afya_lab"]
      interval: 5s
      timeout: 5s
      retries: 10

  report-db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: afya_report
      POSTGRES_USER: afya
      POSTGRES_PASSWORD: afya
    ports:
      - "5442:5432"
    volumes:
      - report_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afya -d afya_report"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  minio_data:
  auth_pg_data:
  user_pg_data:
  hospital_pg_data:
  patient_pg_data:
  admission_pg_data:
  medical_pg_data:
  nursing_pg_data:
  audit_pg_data:
  lab_pg_data:
  report_pg_data:
