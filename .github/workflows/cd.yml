name: CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag des images (ex. v1.0.0 ou sha court)"
        required: true
        default: "manual"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: afya-auth
            context: .
            dockerfile: infra/docker/Dockerfile.spring
            build_args: MAVEN_MODULE=auth-service
          - image: afya-user
            context: .
            dockerfile: infra/docker/Dockerfile.spring
            build_args: MAVEN_MODULE=user-service
          - image: afya-hospital
            context: .
            dockerfile: infra/docker/Dockerfile.spring
            build_args: MAVEN_MODULE=hospital-service
          - image: afya-patient
            context: .
            dockerfile: infra/docker/Dockerfile.spring
            build_args: MAVEN_MODULE=patient-service
          - image: afya-admission
            context: .
            dockerfile: infra/docker/Dockerfile.spring
            build_args: MAVEN_MODULE=admission-service
          - image: afya-medical
            context: .
            dockerfile: infra/docker/Dockerfile.spring
            build_args: MAVEN_MODULE=medical-service
          - image: afya-nursing
            context: .
            dockerfile: infra/docker/Dockerfile.spring
            build_args: MAVEN_MODULE=nursing-service
          - image: afya-lab
            context: .
            dockerfile: infra/docker/Dockerfile.spring
            build_args: MAVEN_MODULE=lab-service
          - image: afya-report
            context: .
            dockerfile: infra/docker/Dockerfile.spring
            build_args: MAVEN_MODULE=report-service
          - image: afya-audit
            context: .
            dockerfile: infra/docker/Dockerfile.spring
            build_args: MAVEN_MODULE=audit-service
          - image: afya-bff
            context: .
            dockerfile: infra/docker/Dockerfile.spring
            build_args: MAVEN_MODULE=afya-bff
          - image: afya-gateway
            context: ./infra/gateway
            dockerfile: Dockerfile
            build_args: ""
          - image: afya-web
            context: ./frontend
            dockerfile: Dockerfile
            build_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:latest
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  helm-lint:
    name: Lint Helm chart
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint infra/k8s/helm/afya -f infra/k8s/helm/afya/values-ci.yaml

  deploy-staging:
    name: Deploy staging (optional)
    runs-on: ubuntu-latest
    needs: [build-and-push, helm-lint]
    if: github.event_name == 'workflow_dispatch'
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        if: ${{ secrets.KUBE_CONFIG_DATA != '' }}
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Helm upgrade staging
        if: ${{ secrets.KUBE_CONFIG_DATA != '' }}
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
        run: |
          helm upgrade --install afya-staging infra/k8s/helm/afya \
            -f infra/k8s/helm/afya/values-staging.yaml \
            --namespace afya-staging --create-namespace \
            --set global.imageRegistry="${IMAGE_REGISTRY}" \
            --set global.imageTag="${IMAGE_TAG}" \
            --wait --timeout 15m

      - name: Skip deploy (no kubeconfig)
        if: ${{ secrets.KUBE_CONFIG_DATA == '' }}
        run: |
          echo "Secret KUBE_CONFIG_DATA absent — images publiées sur GHCR uniquement."
          echo "Déployer manuellement : voir docs/DEPLOIEMENT_PROD.md"
