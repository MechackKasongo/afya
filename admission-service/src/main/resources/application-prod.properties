spring.datasource.url=jdbc:postgresql://${ADMISSION_DB_HOST}:${ADMISSION_DB_PORT:5432}/${ADMISSION_DB_NAME:afya_admission}?sslmode=${DB_SSLMODE:require}
spring.datasource.username=${ADMISSION_DB_USER}
spring.datasource.password=${ADMISSION_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

app.jwt.access-secret=${JWT_ACCESS_SECRET}

app.services.patient-base-url=${PATIENT_SERVICE_URL:http://patient:8083}
app.services.hospital-base-url=${HOSPITAL_SERVICE_URL:http://hospital:8082}
app.services.audit-base-url=${AUDIT_SERVICE_BASE_URL:http://audit:8087}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Lot C — Swagger/OpenAPI désactivé en production (réduction de la surface d'attaque).
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
