spring.datasource.url=jdbc:h2:mem:care_entry_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true

app.jwt.access-secret=test-access-secret-at-least-64-characters-long-for-hs512-signing-key-xx

app.services.patient-base-url=http://localhost:18083
app.services.hospital-base-url=http://localhost:18082

app.audit.enabled=false
