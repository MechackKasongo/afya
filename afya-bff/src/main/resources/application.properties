spring.application.name=afya-bff
server.port=8080
server.forward-headers-strategy=framework

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

app.jwt.access-secret=${JWT_ACCESS_SECRET:dev-access-secret-at-least-64-characters-long-for-hs512-signing-key}

app.services.auth-base-url=${AUTH_SERVICE_URL:http://localhost:8081}
app.services.user-base-url=${USER_SERVICE_URL:http://localhost:8089}
app.services.hospital-base-url=${HOSPITAL_SERVICE_URL:http://localhost:8082}
app.services.patient-base-url=${PATIENT_SERVICE_URL:http://localhost:8083}
app.services.admission-base-url=${ADMISSION_SERVICE_URL:${CARE_ENTRY_SERVICE_URL:http://localhost:8084}}
app.services.medical-base-url=${MEDICAL_SERVICE_URL:http://localhost:8085}
app.services.nursing-base-url=${NURSING_SERVICE_URL:http://localhost:8093}
app.services.audit-base-url=${AUDIT_SERVICE_URL:http://localhost:8087}
app.services.report-base-url=${REPORT_SERVICE_URL:http://localhost:8094}

app.http.client.connect-timeout=${HTTP_CLIENT_CONNECT_TIMEOUT:2s}
app.http.client.read-timeout=${HTTP_CLIENT_READ_TIMEOUT:10s}
app.http.client.retry.max-attempts=${HTTP_CLIENT_RETRY_MAX_ATTEMPTS:2}
app.http.client.retry.delay=${HTTP_CLIENT_RETRY_DELAY:250ms}
app.http.client.circuit.failure-threshold=${HTTP_CLIENT_CIRCUIT_FAILURE_THRESHOLD:5}
app.http.client.circuit.open-duration=${HTTP_CLIENT_CIRCUIT_OPEN_DURATION:30s}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
logging.pattern.level=%5p [corr:%X{correlationId:-na}]
