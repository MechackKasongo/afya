app.services.auth-base-url=${AUTH_SERVICE_URL:http://auth:8081}
app.services.user-base-url=${USER_SERVICE_URL:http://user:8089}
app.services.hospital-base-url=${HOSPITAL_SERVICE_URL:http://hospital:8082}
app.services.patient-base-url=${PATIENT_SERVICE_URL:http://patient:8083}
app.services.admission-base-url=${ADMISSION_SERVICE_URL:http://admission:8084}
app.services.medical-base-url=${MEDICAL_SERVICE_URL:http://medical:8085}
app.services.nursing-base-url=${NURSING_SERVICE_URL:http://nursing:8093}
app.services.audit-base-url=${AUDIT_SERVICE_URL:http://audit:8087}
app.services.report-base-url=${REPORT_SERVICE_URL:http://report:8094}

app.http.client.connect-timeout=${HTTP_CLIENT_CONNECT_TIMEOUT:2s}
