spring.datasource.url=jdbc:postgresql://${AUDIT_DB_HOST}:${AUDIT_DB_PORT:5432}/${AUDIT_DB_NAME:afya_audit}?sslmode=${DB_SSLMODE:require}
spring.datasource.username=${AUDIT_DB_USER}
spring.datasource.password=${AUDIT_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

app.jwt.access-secret=${JWT_ACCESS_SECRET}
app.audit.ingestion-key=${AUDIT_INGESTION_KEY}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Lot C — Swagger/OpenAPI désactivé en production (réduction de la surface d'attaque).
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
