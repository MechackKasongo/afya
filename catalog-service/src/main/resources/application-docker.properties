spring.datasource.url=jdbc:postgresql://${CATALOG_DB_HOST:catalog-db}:5432/${CATALOG_DB_NAME:afya_catalog}
spring.datasource.username=${CATALOG_DB_USER:afya}
spring.datasource.password=${CATALOG_DB_PASSWORD:afya}
spring.datasource.driver-class-name=org.postgresql.Driver

app.jwt.access-secret=${JWT_ACCESS_SECRET:dev-access-secret-at-least-64-characters-long-for-hs512-signing-key}
