spring.datasource.url=jdbc:postgresql://${AUTH_DB_HOST}:${AUTH_DB_PORT:5432}/${AUTH_DB_NAME:afya_auth}?sslmode=${DB_SSLMODE:require}
spring.datasource.username=${AUTH_DB_USER}
spring.datasource.password=${AUTH_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

app.jwt.access-secret=${JWT_ACCESS_SECRET}
app.jwt.refresh-secret=${JWT_REFRESH_SECRET}
app.services.user-base-url=${USER_SERVICE_BASE_URL:http://user:8089}
app.internal.service-key=${INTERNAL_SERVICE_KEY}

app.services.audit-base-url=${AUDIT_SERVICE_BASE_URL:http://audit:8087}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true

# Lot C — Swagger/OpenAPI désactivé en production (réduction de la surface d'attaque).
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
