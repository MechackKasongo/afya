spring.datasource.url=jdbc:postgresql://${AUTH_DB_HOST:auth-db}:5432/${AUTH_DB_NAME:afya_auth}
spring.datasource.username=${AUTH_DB_USER:afya}
spring.datasource.password=${AUTH_DB_PASSWORD:afya}
spring.datasource.driver-class-name=org.postgresql.Driver

app.jwt.access-secret=${JWT_ACCESS_SECRET:dev-access-secret-at-least-64-characters-long-for-hs512-signing-key}
app.jwt.refresh-secret=${JWT_REFRESH_SECRET:dev-refresh-secret-at-least-64-characters-long-for-hs512-signing-key}
app.services.user-base-url=${USER_SERVICE_BASE_URL:http://user:8089}
