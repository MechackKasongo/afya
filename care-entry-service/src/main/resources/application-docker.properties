spring.datasource.url=jdbc:postgresql://${CARE_ENTRY_DB_HOST:care-entry-db}:5432/${CARE_ENTRY_DB_NAME:afya_care_entry}
spring.datasource.username=${CARE_ENTRY_DB_USER:afya}
spring.datasource.password=${CARE_ENTRY_DB_PASSWORD:afya}
spring.datasource.driver-class-name=org.postgresql.Driver

app.jwt.access-secret=${JWT_ACCESS_SECRET:dev-access-secret-at-least-64-characters-long-for-hs512-signing-key}

app.services.patient-base-url=${PATIENT_SERVICE_URL:http://patient:8083}
app.services.catalog-base-url=${CATALOG_SERVICE_URL:http://catalog:8082}
app.services.stay-base-url=${STAY_SERVICE_URL:http://stay:8085}
app.http.client.connect-timeout=${HTTP_CLIENT_CONNECT_TIMEOUT:2s}
app.http.client.read-timeout=${HTTP_CLIENT_READ_TIMEOUT:10s}
app.http.client.retry.max-attempts=${HTTP_CLIENT_RETRY_MAX_ATTEMPTS:2}
app.http.client.retry.delay=${HTTP_CLIENT_RETRY_DELAY:250ms}
app.http.client.circuit.failure-threshold=${HTTP_CLIENT_CIRCUIT_FAILURE_THRESHOLD:5}
app.http.client.circuit.open-duration=${HTTP_CLIENT_CIRCUIT_OPEN_DURATION:30s}
app.services.audit-base-url=${AUDIT_SERVICE_BASE_URL:http://audit:8087}
