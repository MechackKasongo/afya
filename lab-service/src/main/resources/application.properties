spring.application.name=lab-service
spring.profiles.active=dev
server.port=8092

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info,metrics

app.jwt.access-secret=${JWT_ACCESS_SECRET:dev-access-secret-at-least-64-characters-long-for-hs512-signing-key}
app.internal.service-key=${INTERNAL_SERVICE_KEY:dev-internal-service-key}

app.services.report-base-url=${REPORT_SERVICE_BASE_URL:http://localhost:8094}
app.audit.enabled=${AUDIT_ENABLED:true}
app.audit.ingestion-key=${AUDIT_INGESTION_KEY:dev-audit-ingestion-key}

logging.pattern.level=%5p [corr:%X{correlationId:-na}]
