spring.datasource.url=jdbc:postgresql://${LAB_DB_HOST}:${LAB_DB_PORT:5432}/${LAB_DB_NAME:afya_lab}?sslmode=${DB_SSLMODE:require}
spring.datasource.username=${LAB_DB_USER}
spring.datasource.password=${LAB_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

app.jwt.access-secret=${JWT_ACCESS_SECRET}

app.services.report-base-url=${REPORT_SERVICE_BASE_URL:http://report:8094}
app.services.audit-base-url=${AUDIT_SERVICE_BASE_URL:http://audit:8087}
app.services.medical-base-url=${MEDICAL_SERVICE_BASE_URL:http://medical:8085}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true

# Lot C — Swagger/OpenAPI désactivé en production (réduction de la surface d'attaque).
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
