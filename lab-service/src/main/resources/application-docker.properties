spring.datasource.url=jdbc:postgresql://${LAB_DB_HOST:lab-db}:5432/${LAB_DB_NAME:afya_lab}
spring.datasource.username=${LAB_DB_USER:afya}
spring.datasource.password=${LAB_DB_PASSWORD:afya}
spring.datasource.driver-class-name=org.postgresql.Driver

app.jwt.access-secret=${JWT_ACCESS_SECRET}
app.internal.service-key=${INTERNAL_SERVICE_KEY:dev-internal-service-key}

app.services.report-base-url=${REPORT_SERVICE_BASE_URL:http://report:8094}
app.services.audit-base-url=${AUDIT_SERVICE_BASE_URL:http://audit:8087}
