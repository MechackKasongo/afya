spring.datasource.url=jdbc:postgresql://${HOSPITAL_DB_HOST}:${HOSPITAL_DB_PORT:5432}/${HOSPITAL_DB_NAME:afya_hospital}?sslmode=${DB_SSLMODE:require}
spring.datasource.username=${HOSPITAL_DB_USER}
spring.datasource.password=${HOSPITAL_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

app.jwt.access-secret=${JWT_ACCESS_SECRET}

app.services.audit-base-url=${AUDIT_SERVICE_BASE_URL:http://audit:8087}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Lot C — Swagger/OpenAPI désactivé en production (réduction de la surface d'attaque).
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
